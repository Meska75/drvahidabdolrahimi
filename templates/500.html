{% load static %}<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خطای سرور — دکتر وحید عبدالرحیمی</title>
<link rel="stylesheet" href="{% static 'css/vazirmatn.css' %}">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Vazirmatn', Tahoma, sans-serif;
        background: linear-gradient(145deg, #0b1628 0%, #0f2642 50%, #0b1e38 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        padding: 24px;
        position: relative;
        overflow: hidden;
    }

    body::before, body::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0.07;
    }
    body::before {
        width: 500px; height: 500px;
        background: #dc2626;
        top: -120px; right: -120px;
    }
    body::after {
        width: 380px; height: 380px;
        background: #0f766e;
        bottom: -80px; left: -80px;
    }

    .card {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 520px;
        width: 100%;
        animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* آیکون ابزار */
    .icon-wrap {
        width: 110px; height: 110px;
        background: rgba(220,38,38,0.1);
        border: 2px solid rgba(220,38,38,0.3);
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
        box-shadow: 0 0 40px rgba(220,38,38,0.18);
    }

    .icon-wrap svg { width: 52px; height: 52px; }

    /* عدد ۵۰۰ */
    .error-code {
        font-size: clamp(5rem, 18vw, 9rem);
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(135deg, #dc2626, #f97316, #fbbf24);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
        letter-spacing: -4px;
    }

    h1 {
        font-size: clamp(1.2rem, 4vw, 1.6rem);
        font-weight: 700;
        color: #e2e8f0;
        margin-bottom: 12px;
    }

    p {
        font-size: 0.95rem;
        color: #94a3b8;
        line-height: 1.8;
        margin-bottom: 36px;
    }

    .btn-group {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .btn-primary {
        background: linear-gradient(135deg, #0f766e, #0891b2);
        color: #fff;
        text-decoration: none;
        padding: 13px 28px;
        border-radius: 12px;
        font-size: 0.95rem;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        border: none;
        transition: filter 0.18s, transform 0.15s;
        box-shadow: 0 4px 16px rgba(15,118,110,0.35);
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .btn-primary:hover {
        filter: brightness(1.1);
        transform: translateY(-2px);
        color: #fff;
        text-decoration: none;
    }

    .btn-secondary {
        background: rgba(255,255,255,0.08);
        color: #cbd5e1;
        text-decoration: none;
        padding: 13px 28px;
        border-radius: 12px;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        border: 1.5px solid rgba(255,255,255,0.15);
        transition: background 0.18s, color 0.18s, transform 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .btn-secondary:hover {
        background: rgba(255,255,255,0.14);
        color: #fff;
        transform: translateY(-2px);
        text-decoration: none;
    }

    /* لوگو بالا */
    .top-logo {
        position: absolute;
        top: 24px;
        right: 32px;
        font-size: 0.95rem;
        font-weight: 700;
        color: rgba(255,255,255,0.55);
        text-decoration: none;
    }

    .top-logo:hover { color: #2dd4bf; text-decoration: none; }

    .divider {
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, #dc2626, #f97316);
        border-radius: 3px;
        margin: 0 auto 24px;
    }

    /* نوار وضعیت کوچک */
    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(220,38,38,0.12);
        border: 1px solid rgba(220,38,38,0.25);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.78rem;
        color: #fca5a5;
        margin-bottom: 20px;
    }

    .status-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: #ef4444;
        animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.4; transform: scale(0.8); }
    }
</style>
</head>
<body>

<a class="top-logo" href="/">دکتر وحید عبدالرحیمی</a>

<div class="card">
    <div class="icon-wrap">
        <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- آیکون ابزار/تعمیر -->
            <path d="M38 8a8 8 0 0 1-8 13.6L14 38a4 4 0 1 1-5.6-5.6L24.4 16A8 8 0 0 1 38 8z" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14.5 37.5l-3 3" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="38" cy="38" r="7" stroke="#ef4444" stroke-width="2.5"/>
            <path d="M35 38h6M38 35v6" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
    </div>

    <div class="status-badge">
        <span class="status-dot"></span>
        در حال بررسی مشکل
    </div>

    <div class="error-code">500</div>
    <div class="divider"></div>
    <h1>خطایی در سرور رخ داده است</h1>
    <p>
        مشکل فنی موقتی است و تیم فنی در حال بررسی آن است.<br>
        لطفاً چند لحظه صبر کنید و دوباره تلاش کنید.
    </p>

    <div class="btn-group">
        <button class="btn-primary" onclick="window.location.reload()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
            </svg>
            تلاش مجدد
        </button>
        <a href="/" class="btn-secondary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            صفحه اصلی
        </a>
    </div>
</div>

</body>
</html>
